services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taggy
    volumes:
      - taggy_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taggy"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Sobrepõe .env local: dentro da rede Compose o host do Postgres é `db`
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/taggy
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: >
      uv run uvicorn src.main:app
      --host 0.0.0.0 --port 8000 --reload

volumes:
  taggy_pgdata:
